name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # et_xmlfile es dependencia directa de openpyxl; se especifica explícitamente
          # para asegurar que Flet lo incluya correctamente en el APK
          pip install flet openpyxl et_xmlfile
          pip list

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Build APK with Flet
        run: |
          # NOTA: el namespace correcto es io.flutter.embedding.android (no io.flutter.app)
          # El flag incorrecto era ignorado silenciosamente y dejaba Impeller activo,
          # causando los errores de GPU buffer "Usage not permitted" en tablets Mediatek/Xiaomi.
          flet build apk \
            --project AutoSRT \
            --description "Aplicación para relevamiento SRT 900/15" \
            --android-meta-data io.flutter.embedding.android.EnableImpeller=false

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoSRT-Android-APK
          path: build/apk/**/*.apk
