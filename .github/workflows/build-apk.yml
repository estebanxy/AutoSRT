name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # IMPORTANTE: usar la misma versión de flet que requirements.txt (0.28.3)
          # Flet 0.80+ es una reescritura completa con arquitectura diferente.
          # Con 0.86.x el APK se genera sin libpyjni.so → pantalla negra.
          pip install -r requirements.txt
          pip list

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.3"  # Versión compatible con flet 0.28.3
          channel: 'stable'

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Build APK with Flet
        run: |
          flet build apk \
            --project AutoSRT \
            --description "Aplicación para relevamiento SRT 900/15"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoSRT-Android-APK
          path: build/apk/**/*.apk
