name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet openpyxl

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK with Flet
        run: |
          flet build apk main --project AutoSRT --description "Aplicación para relevamiento SRT 900/15"
          #flet build apk main.py --project AutoSRT --description "Aplicación para relevamiento SRT 900/15"
          #flet build apk app_flet.py --project AutoSRT --description "Aplicación para relevamiento SRT 900/15"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoSRT-Android-APK
          path: build/apk/**/*.apk
